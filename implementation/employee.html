<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DriveFlow | Staff Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-info shadow mb-4">
        <div class="container">
            <span class="navbar-brand">🚗 DriveFlow Staff Dashboard</span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white">
                <h5 class="mb-0">Operation Queue</h5>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Customer</th>
                            <th>Vehicle</th>
                            <th>Dates</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="staff-table">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadAllBookings() {
            const res = await fetch('http://localhost:5000/all-bookings');
            const bookings = await res.json();
            const table = document.getElementById('staff-table');
            
            table.innerHTML = bookings.map(b => `
                <tr>
                    <td>
                        <strong>${b.customer_name}</strong><br>
                        <small class="text-muted">Lic: ${b.license_number}</small>
                    </td>
                    <td>${b.make} ${b.model}</td>
                    <td>
                        <small>${new Date(b.pickup_date).toLocaleDateString()} to<br>
                        ${new Date(b.return_date).toLocaleDateString()}</small>
                    </td>
                    <td><span class="badge bg-${getStatusColor(b.status)}">${b.status}</span></td>
                    <td>
                        ${b.status === 'Pending' ? 
                            `<button class="btn btn-sm btn-success" onclick="updateStatus(${b.booking_id}, 'Confirmed')">Confirm Pay</button>` : ''}
                        ${b.status === 'Confirmed' ? 
                            `<button class="btn btn-sm btn-primary" onclick="updateStatus(${b.booking_id}, 'Picked Up')">Inspect & Out</button>` : ''}
                        ${b.status === 'Picked Up' ? 
                            `<button class="btn btn-sm btn-warning" onclick="updateStatus(${b.booking_id}, 'Completed')">Return Inspect</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(id, newStatus) {
            await fetch(`http://localhost:5000/bookings/update-status/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            });
            loadAllBookings(); // Refresh list
        }

        function getStatusColor(status) {
            if(status === 'Pending') return 'warning';
            if(status === 'Confirmed') return 'info';
            if(status === 'Picked Up') return 'primary';
            return 'success';
        }

        function logout() { localStorage.clear(); window.location.href='login.html'; }
        
        loadAllBookings();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveFlow | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0a0a0f;
            --surface:  #13131a;
            --surface2: #1c1c28;
            --border:   rgba(255,255,255,0.07);
            --accent:   #c8f03c;
            --accent2:  #5b5ef4;
            --text:     #e8e8f0;
            --muted:    #6b6b80;
            --danger:   #ff4d6d;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Animated background orbs */
        .bg-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: orb-float 8s ease-in-out infinite;
        }
        .orb-1 { width: 500px; height: 500px; background: var(--accent2); top: -200px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 400px; height: 400px; background: var(--accent); opacity: 0.15; bottom: -150px; right: 40%; animation-delay: -3s; }
        .orb-3 { width: 300px; height: 300px; background: rgba(200,240,60,0.4); top: 40%; right: -100px; animation-delay: -5s; }

        @keyframes orb-float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%       { transform: translate(20px, -30px) scale(1.05); }
            66%       { transform: translate(-15px, 20px) scale(0.97); }
        }

        /* Layout — left brand panel + right form panel */
        .brand-panel {
            width: 45%;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }

        .brand-logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .brand-logo span { color: var(--accent); }

        .brand-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem 0;
        }
        .brand-hero h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -2px;
            margin-bottom: 1.25rem;
        }
        .brand-hero h1 em {
            font-style: normal;
            color: var(--accent);
        }
        .brand-hero p {
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.7;
            max-width: 340px;
            font-weight: 300;
        }

        /* Floating car stats strip */
        .stats-strip {
            display: flex;
            gap: 2rem;
        }
        .stat-item {}
        .stat-item__val {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--accent);
        }
        .stat-item__label {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Right form panel */
        .form-panel {
            width: 55%;
            background: rgba(19,19,26,0.7);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            position: relative;
            z-index: 1;
        }

        .form-box {
            width: 100%;
            max-width: 420px;
        }

        .form-box h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.9rem;
            font-weight: 800;
            margin-bottom: 0.4rem;
            animation: fadeUp 0.5s ease both;
        }
        .form-box .subtitle {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            animation: fadeUp 0.5s 0.05s ease both;
        }

        /* Role selector tabs */
        .role-tabs {
            display: flex;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 1.75rem;
            animation: fadeUp 0.5s 0.1s ease both;
        }
        .role-tab {
            flex: 1;
            padding: 0.6rem;
            text-align: center;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--muted);
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.25s;
            border: none;
            background: none;
            font-family: 'DM Sans', sans-serif;
        }
        .role-tab.active {
            background: var(--accent);
            color: #0a0a0f;
            font-weight: 700;
        }
        .role-tab:not(.active):hover { color: var(--text); }

        /* Form fields */
        .field-group {
            margin-bottom: 1.2rem;
            animation: fadeUp 0.5s 0.15s ease both;
        }
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
        }
        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            padding: 0.85rem 1rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(200,240,60,0.1);
        }
        input::placeholder { color: var(--muted); }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: var(--accent);
            color: #0a0a0f;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 0.5rem;
            animation: fadeUp 0.5s 0.2s ease both;
            letter-spacing: 0.02em;
        }
        .btn-submit:hover {
            background: #d4f55a;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(200,240,60,0.3);
        }
        .btn-submit:active { transform: translateY(0); }

        .form-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--muted);
            animation: fadeUp 0.5s 0.25s ease both;
        }
        .form-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .form-footer a:hover { text-decoration: underline; }

        #message {
            margin-top: 1rem;
            font-size: 0.85rem;
            text-align: center;
            min-height: 1.2rem;
            animation: fadeUp 0.3s ease both;
        }
        .msg-error   { color: var(--danger); }
        .msg-success { color: #22d9a0; }

        /* Animated corner decoration */
        .corner-deco {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            width: 80px;
            height: 80px;
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            animation: spin-slow 20s linear infinite;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin-slow { to { transform: rotate(360deg); } }

        /* Thin animated line under logo */
        .brand-logo::after {
            content: '';
            display: block;
            width: 2rem;
            height: 2px;
            background: var(--accent);
            margin-top: 0.5rem;
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .brand-panel { width: 100%; padding: 2rem; min-height: auto; }
            .brand-hero h1 { font-size: 2.2rem; }
            .form-panel { width: 100%; border-left: none; border-top: 1px solid var(--border); padding: 2rem 1.25rem; }
            .stats-strip { display: none; }
        }
    </style>
</head>
<body>

<div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<!-- Left brand panel -->
<div class="brand-panel">
    <div class="brand-logo">Drive<span>Flow</span></div>

    <div class="brand-hero">
        <h1>Move<br>with<br><em>Freedom.</em></h1>
        <p>Premium car rentals, seamless experience. Your journey starts the moment you log in.</p>
    </div>

    <div class="stats-strip">
        <div class="stat-item">
            <div class="stat-item__val">120+</div>
            <div class="stat-item__label">Vehicles</div>
        </div>
        <div class="stat-item">
            <div class="stat-item__val">3</div>
            <div class="stat-item__label">Branches</div>
        </div>
        <div class="stat-item">
            <div class="stat-item__val">24/7</div>
            <div class="stat-item__label">Support</div>
        </div>
    </div>

    <div class="corner-deco">🚗</div>
</div>

<!-- Right form panel -->
<div class="form-panel">
    <div class="form-box">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to continue to your dashboard.</p>

        <!-- Role selector -->
        <div class="role-tabs" id="roleTabs">
            <button class="role-tab active" data-role="Customer" onclick="setRole(this)">🧑 Customer</button>
            <button class="role-tab" data-role="Employee" onclick="setRole(this)">👔 Employee</button>
            <button class="role-tab" data-role="Admin" onclick="setRole(this)">🔐 Admin</button>
        </div>

        <div class="field-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="field-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <button class="btn-submit" onclick="handleLogin()">Sign In →</button>

        <div id="message"></div>

        <div class="form-footer">
            Don't have an account? <a href="Regiter.html">Create one</a>
        </div>
    </div>
</div>

<script>
    let selectedRole = 'Customer';

    function setRole(btn) {
        document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        selectedRole = btn.getAttribute('data-role');
    }

    async function handleLogin() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const msgDiv   = document.getElementById('message');

        if (!email || !password) {
            msgDiv.innerHTML = '<span class="msg-error">Please fill in all fields.</span>';
            return;
        }

        msgDiv.innerHTML = '<span style="color:var(--muted)">Signing in...</span>';

        try {
            const response = await fetch('http://localhost:5000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, role: selectedRole })
            });

            const data = await response.json();

            if (response.ok) {
                // Validate role matches selected tab
                if (data.user.role !== selectedRole) {
                    msgDiv.innerHTML = `<span class="msg-error">This account is not registered as ${selectedRole}. Please select the correct role.</span>`;
                    return;
                }

                localStorage.setItem('user', JSON.stringify(data.user));
                msgDiv.innerHTML = '<span class="msg-success">✓ Login successful! Redirecting...</span>';

                setTimeout(() => {
                    if (data.user.role === 'Admin')         window.location.href = 'admin.html';
                    else if (data.user.role === 'Employee') window.location.href = 'employee.html';
                    else                                    window.location.href = 'customer.html';
                }, 1200);
            } else {
                msgDiv.innerHTML = `<span class="msg-error">${data.message || 'Invalid credentials.'}</span>`;
            }
        } catch (err) {
            msgDiv.innerHTML = '<span class="msg-error">Server error. Is the backend running?</span>';
        }
    }

    // Allow Enter key
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
    });
</script>
</body>
</html>

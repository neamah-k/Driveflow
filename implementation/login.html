<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveFlow | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="card shadow login-card">
        <div class="card-body">
            <h3 class="text-center mb-4">🚗 DriveFlow</h3>
            <h5 class="text-center text-muted mb-4">Login to your account</h5>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" id="email" class="form-control" required placeholder="name@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
            </form>

            <div class="text-center mt-3">
                <p class="small">Don't have an account? <a href="register.html">Register here</a></p>
            </div>
            <div id="message" class="mt-3 text-center"></div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            try {
                const response = await fetch('http://localhost:5000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

               if (response.ok) {
                    // 1. Save user data
                    localStorage.setItem('user', JSON.stringify(data.user));

                    messageDiv.innerHTML = `<span class="text-success">Login successful! Redirecting...</span>`;

                    // 2. Redirect based on role (The fix is here!)
                    setTimeout(() => {
                        if (data.user.role === 'Admin') {
                            window.location.href = 'admin.html';
                        } else if (data.user.role === 'Employee') {
                            window.location.href = 'employee.html';
                        } else {
                            window.location.href = 'customer.html';
                        }
                    }, 1500);
                }
                else {
                    messageDiv.innerHTML = `<span class="text-danger">${data.message}</span>`;
                }
            } catch (error) {
                messageDiv.innerHTML = `<span class="text-danger">Server Error. Please try again.</span>`;
            }
        });
    </script>
</body>
</html>
